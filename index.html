<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor DICOM Profesional</title>
    <!-- Enlace a tu CSS optimizado (reemplaza la URL si es externa) -->
    <link rel="stylesheet" href="visordicomcss.css">
</head>
<body>

    <!-- Contenedor estructural fijo (Evita crecimiento infinito) -->
    <div class="scroll-wrapper">
        
        <!-- Área de visualización centralizada -->
        <main class="visor-container">
            
            <!-- 1. BARRA DE HERRAMIENTAS (TOOLBAR) UNIFICADA -->
            <nav class="toolbar" aria-label="Herramientas del visor">
                
                <!-- Botón Reproducir (Cine Loop) -->
                <button type="button" id="btnPlay" class="tool-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    <span class="btn-text" data-text-off="Play" data-text-on="Pausa"></span>
                </button>

                <!-- Botón Invertir Color -->
                <button type="button" id="btnInvert" class="tool-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path>
                        <path d="M12 18a6 6 0 1 0 0-12v12z"></path>
                    </svg>
                    <span class="btn-text" data-text-off="Invertir" data-text-on="Normal"></span>
                </button>

                <!-- Botón Ajuste Ventana (Brillo/Contraste) -->
                <button type="button" id="btnContraste" class="tool-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="2" x2="12" y2="22"></line>
                    </svg>
                    <span class="btn-text" data-text-off="Ventana" data-text-on="Fijar"></span>
                </button>

                <!-- Botón Zoom / Paneo -->
                <button type="button" id="btnZoom" class="tool-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        <line x1="11" y1="8" x2="11" y2="14"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                    <span class="btn-text" data-text-off="Zoom" data-text-on="Zoom"></span>
                </button>

                <!-- Botón Restablecer (Reset) -->
                <button type="button" id="btnReset" class="tool-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
                    </svg>
                    <span class="btn-text" data-text-off="Reset" data-text-on="Reset"></span>
                </button>
            </nav>

            <!-- 2. CAJA PROTECTORA DEL MARCO DE IMAGEN -->
            <div id="wrapper" class="frame-wrapper">
                <!-- Imagen DICOM Dinámica -->
                <img id="dicomFrame" src="" alt="Corte Tomográfico DICOM" draggable="false">
                
                <!-- Capa de Marca de Agua (Filtro por CSS) -->
                <div class="watermark-overlay">RadiologiaEC</div>
            </div>

            <!-- 3. PANEL DE CONTROL INFERIOR (FOOTER PANEL) -->
            <footer class="controls-panel">
                <!-- Fila de Metadatos y Estados -->
                <div class="info-row">
                    <span id="loaderStatus">Cargando visor...</span>
                    <span id="frameCounter" class="status-badge">0 / 0</span>
                </div>

                <!-- Barra Deslizante de Precisión -->
                <input type="range" id="frameSlider" class="slider-control" min="0" value="0" step="1" disabled aria-label="Control de fotogramas">
            </footer>

        </main>
    </div>

    <!-- Enlace a tu JavaScript optimizado (Se ejecuta de último para no bloquear la carga) -->
    <script src="visordicomjs.js" defer></script>
</body>
</html>
