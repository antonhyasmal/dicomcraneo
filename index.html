<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor DICOM Profesional Completo</title>
    
    <!-- // ENLACE AL ARCHIVO DE ESTILOS EXTERNOS (CSS) -->
    <!-- Vincula la apariencia visual, colores de la interfaz y comportamiento responsivo -->
    <link rel="stylesheet" href="visordicomcss.css">
</head>
<body>

    <!-- // CONTENEDOR DE CONTROL DE SCROLL GLOBAL -->
    <!-- Define el largo de la página. A mayor altura en vh, más suave y preciso es el paso de imágenes -->
    <div class="scroll-wrapper">
        
        <!-- // CONTENEDOR FIJO EN PANTALLA (STICKY VISOR) -->
        <!-- Mantiene la pantalla de diagnóstico clavada en el centro mientras el usuario hace scroll -->
        <div class="visor-container">
            
            <!-- // BARRA DE HERRAMIENTAS SUPERIORES -->
            <!-- Aloja los botones interactivos de autoplay, filtros avanzados, zoom y reinicio -->
            <div class="toolbar">
                <button class="tool-btn" id="btnPlay">▶ Autoplay</button>
                <button class="tool-btn" id="btnInvert">🌗 Invertir</button>
                <button class="tool-btn" id="btnContraste">✨ Contraste</button>
                <button class="tool-btn" id="btnZoom">🔍 Zoom</button>
                <button class="tool-btn" id="btnReset">🔄 Reset</button>
            </div>

            <!-- // MARCO ENMARCADOR DEL VISOR DE IMÁGENES -->
            <!-- Enmarca el estudio médico y recorta los desbordes laterales cuando el zoom está activo -->
            <div class="frame-wrapper" id="wrapper">
                <!-- Elemento de imagen puro donde se inyectan las capas radiológicas -->
                <img id="dicomFrame" src="" alt="Cargando visor...">
            </div>

            <!-- // PANEL DE METADATOS Y CONTROL INFERIOR -->
            <!-- Despliega los estados de carga del archivo, el contador de cortes y la barra deslizante manual -->
            <div class="controls-panel">
                <div class="info-row">
                    <span id="loaderStatus">Inicializando componentes...</span>
                    <span class="status-badge" id="frameCounter">0 / 0</span>
                </div>
                <!-- Barra de rango nativa ideal para control fino con el dedo en pantallas táctiles -->
                <input type="range" id="frameSlider" class="slider-control" min="0" max="0" value="0" disabled>
            </div>

        </div>
    </div>

    <!-- // ENLACE AL ARCHIVO DE LÓGICA (JAVASCRIPT) -->
    <!-- Carga el código encargado de controlar las animaciones, gestos del mouse y precarga en memoria -->
    <script src="visordicomjs.js"></script>
</body>
</html>
